name: "Jira Naming Enforcer (Branch, PR, Commits)"

on:
  push:
    # Runs on every push to feature branches, but ignores production branches
    branches-ignore:
      - main
      - master
      - develop
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  enforce-conventions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches history so git log can scan commits safely

      # ------------------------------------------------------------------
      # 1. VALIDATE BRANCH NAME (Runs on Push & PR)
      # ------------------------------------------------------------------
      - name: 1. Validate Branch Name
        run: |
          # Detect branch name based on whether it is a Push or a PR event
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi
          
          echo "Checking Branch Name: $BRANCH_NAME"
          REGEX="^[A-Z]+-[0-9]+\/(feat|fix|refactor|chore|docs|test|perf|build|ci|revert)-.+$"
          
          if [[ ! "$BRANCH_NAME" =~ $REGEX ]]; then
            echo "::error::Branch name '$BRANCH_NAME' is invalid."
            echo "Expected format: <JIRA-ID>/<type>-<description>"
            echo "Example: PROJ-125/fix-create-test-name"
            exit 1
          fi
          echo "✅ Branch Name is valid!"

      # ------------------------------------------------------------------
      # 2. VALIDATE PULL REQUEST TITLE (Only runs on PRs)
      # ------------------------------------------------------------------
      - name: 2. Validate PR Title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Checking PR Title: $PR_TITLE"
          REGEX="^(\[?[A-Z]+-[0-9]+\]?)[ \/](Feat|Fix|Refactor|Chore|Docs|Test|Perf|Build|Ci|Revert)[:-].+$"
          
          if [[ ! "$PR_TITLE" =~ $REGEX ]]; then
            echo "::error::PR Title '$PR_TITLE' is invalid."
            echo "Expected format: <JIRA-ID>/<Type>-<Subject>"
            exit 1
          fi
          echo "✅ PR Title is valid!"

      # ------------------------------------------------------------------
      # 3. VALIDATE COMMIT MESSAGES (Runs on Push & PR)
      # ------------------------------------------------------------------
      - name: 3. Validate Commit Messages
        run: |
          echo "Checking commit messages..."
          
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR Mode: Scan all commits belonging to the Pull Request
            COMMITS=$(git log --no-merges --format=%s ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          else
            # Push Mode: Scan only the newly pushed commits
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              # Brand new branch push: compare commits against your default branch
              COMMITS=$(git log --no-merges --format=%s origin/main..HEAD 2>/dev/null || git log --no-merges --format=%s origin/master..HEAD 2>/dev/null || git log --no-merges --format=%s -1)
            else
              # Existing branch push: scan commits between the old SHA and new SHA
              COMMITS=$(git log --no-merges --format=%s ${{ github.event.before }}..${{ github.event.after }})
            fi
          fi
          
          if [[ -z "$COMMITS" ]]; then
            echo "✅ No new commits found to validate."
            exit 0
          fi
          
          REGEX="^\[[A-Z]+-[0-9]+\] (feat|fix|refactor|chore|docs|test|perf|build|ci|revert)(\([a-z-]+\))?: .+$"
          
          while IFS= read -r commit; do
            if [[ -z "$commit" ]]; then continue; fi
            echo "Checking commit: $commit"
            if [[ ! "$commit" =~ $REGEX ]]; then
              echo "::error::Commit message '$commit' is invalid."
              echo "Expected format: '[JIRA-ID] type(scope): subject'"
              echo "Example: [PROJ-125] fix: update test execution details"
              exit 1
            fi
          done <<< "$COMMITS"
          
          echo "✅ All commit messages are valid!"
